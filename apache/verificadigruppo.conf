<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /workspaces/verificadigruppo/public

    <Directory /workspaces/verificadigruppo/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/verificadigruppo-error.log
    CustomLog ${APACHE_LOG_DIR}/verificadigruppo-access.log combined
</VirtualHost>
