<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Fornitore - FornitoriPezziDB</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>FornitoriPezziDB</h2>
                <p class="user-role">Fornitore</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-section="catalogo">
                    <span class="nav-icon">📦</span>
                    Il Mio Catalogo
                </a>
                <a href="#" class="nav-item" data-section="pezzi">
                    <span class="nav-icon">⚙️</span>
                    Pezzi Disponibili
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <strong id="fornitoreNome"></strong>
                    <small id="username"></small>
                </div>
                <button class="btn btn-secondary btn-sm" id="logoutBtn">Esci</button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1 id="sectionTitle">Il Mio Catalogo</h1>
                <button class="btn btn-primary" id="addBtn">
                    <span>+</span> Aggiungi Pezzo
                </button>
            </header>
            
            <div class="content-body">
                <!-- Info Summary -->
                <div class="info-cards" id="infoCards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div class="info-card" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <div style="font-size: 12px; color: #777; margin-bottom: 5px;">PEZZI NEL CATALOGO</div>
                        <div style="font-size: 32px; font-weight: 600; color: #667eea;" id="totalPezzi">-</div>
                    </div>
                    <div class="info-card" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <div style="font-size: 12px; color: #777; margin-bottom: 5px;">VALORE INVENTARIO</div>
                        <div style="font-size: 32px; font-weight: 600; color: #28a745;" id="valoreTotale">-</div>
                    </div>
                    <div class="info-card" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <div style="font-size: 12px; color: #777; margin-bottom: 5px;">QUANTITÀ TOTALE</div>
                        <div style="font-size: 32px; font-weight: 600; color: #764ba2;" id="quantitaTotale">-</div>
                    </div>
                </div>
                
                <!-- Search and Filters -->
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Cerca nel catalogo...">
                    <span class="search-icon">🔍</span>
                </div>
                
                <!-- Data Table -->
                <div class="table-container">
                    <table class="data-table" id="dataTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <button class="btn btn-sm" id="prevBtn">Precedente</button>
                    <span id="pageInfo">Pagina 1 di 1</span>
                    <button class="btn btn-sm" id="nextBtn">Successivo</button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Modal per Dialog -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Dettagli</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCloseBtn">Chiudi</button>
                <button class="btn btn-primary" id="modalActionBtn" style="display:none;">Salva</button>
            </div>
        </div>
    </div>
    
    <script src="dashboard-common.js"></script>
    <script src="dashboard-fornitore.js"></script>
</body>
</html>
